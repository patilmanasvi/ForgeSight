version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_ENVIRONMENT=development
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  # Optional: Local mock API server (if needed for testing)
  api-mock:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "8000:8000"
    volumes:
      - ./api-mock:/app
    command: node server.js
    restart: unless-stopped
